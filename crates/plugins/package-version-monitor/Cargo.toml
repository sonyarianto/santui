[package]
name = "santui-package-version-monitor"
version = "0.2.31"
edition = "2021"

[[bin]]
name = "santui-package-version-monitor"
path = "src/main.rs"

[dependencies]
santui-ipc = { path = "../../ipc", version = "0.2.31", default-features = false }
serde = { workspace = true }
serde_json = { workspace = true }
log = { workspace = true }
env_logger = { workspace = true }
chrono = { version = "0.4", features = ["clock", "serde"] }
toml = "1.1"
ureq = "3"
arboard = "3"
