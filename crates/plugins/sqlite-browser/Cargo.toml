[package]
name = "santui-sqlite-browser"
version = "0.2.33"
edition = "2021"

[[bin]]
name = "santui-sqlite-browser"
path = "src/main.rs"

[dependencies]
santui-ipc  = { path = "../../ipc",  version = "0.2.33", default-features = false }
rusqlite    = { version = "0.40", features = ["bundled"] }
serde_json  = "1"
log         = "0.4"
env_logger  = "0.11"
