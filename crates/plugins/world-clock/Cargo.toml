[package]
name = "santui-world-clock"
version = "0.2.27"
edition = "2021"

[[bin]]
name = "santui-world-clock"
path = "src/main.rs"

[dependencies]
santui-ipc  = { path = "../../ipc",  version = "0.2.27", default-features = false }
chrono      = { version = "0.4", features = ["clock"] }
chrono-tz   = { version = "0.9", features = ["serde"] }
serde       = { workspace = true }
serde_json  = { workspace = true }
log         = { workspace = true }
env_logger  = { workspace = true }
