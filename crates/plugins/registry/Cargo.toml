[package]
name = "santui-registry-plugin"
version = "0.2.10"
edition = "2021"

[dependencies]
santui-ipc = { path = "../../ipc", version = "0.2.10", default-features = false }
santui-registry = { path = "../../registry", version = "0.2.10" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = { workspace = true }
env_logger = { workspace = true }
