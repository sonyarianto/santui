[package]
name = "santui-uuid-generator"
version = "0.2.28"
edition = "2021"

[[bin]]
name = "santui-uuid-generator"
path = "src/main.rs"

[dependencies]
santui-ipc = { path = "../../ipc", version = "0.2.28", default-features = false }
serde_json = { workspace = true }
log = { workspace = true }
env_logger = { workspace = true }
arboard = "3"
uuid = { version = "1", features = ["v4", "v7"] }
