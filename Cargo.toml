[workspace]
members = [
    "crates/core",
    "crates/ipc",
    "crates/auth",
    "crates/registry",
    "crates/db",
    "crates/plugins/radio-streaming-player",
    "crates/plugins/radio-streaming-player/scraper",
    "crates/plugins/registry",
    "crates/app",
]
resolver = "2"

[workspace.dependencies]
log = "0.4"
env_logger = "0.11"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
