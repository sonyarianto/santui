[workspace]
members = [
    "crates/core",
    "crates/ipc",
    "crates/auth",
    "crates/registry",
    "crates/db",
    "crates/plugins/radio-stream-player",
    "crates/plugins/system-monitor",
    "crates/plugins/world-clock",
    "crates/plugins/radio-stream-player/scraper",
    "crates/plugins/registry",
    "crates/plugins/weather",
    "crates/app",
]
resolver = "2"

[workspace.dependencies]
log = "0.4"
env_logger = "0.11"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
