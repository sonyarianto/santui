name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libmpv-dev

      # clippy subsumes cargo check — only run it once
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo fmt --check

      # Only test the crates that actually have tests (avoids building all 110+ plugin test binaries)
      - run: cargo test -p santui-core -p santui-ipc -p santui-registry -p santui-db -p santui-server -p santui-auth

      - name: Install & run cargo-audit
        run: |
          cargo install cargo-audit --locked
          cargo audit --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195

