name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release --workspace

      - name: Install dylibbundler (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install dylibbundler

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/package-release-linux.sh "${GITHUB_REF_NAME#v}"

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: .\scripts\package-release.ps1 "$($env:GITHUB_REF_NAME -replace '^v','')"

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: bash scripts/package-release-macos.sh "${GITHUB_REF_NAME#v}"

      - name: Determine archive extension
        id: ext
        shell: bash
        run: |
          ext="tar.gz"
          [ "${{ matrix.os }}" = "windows-latest" ] && ext="zip"
          echo "ext=$ext" >> "$GITHUB_OUTPUT"
          echo "name=santui-${{ matrix.target }}.$ext" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ext.outputs.name }}
          path: releases/${{ steps.ext.outputs.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Set package version from tag
        working-directory: packages/npm
        run: |
          VER="${GITHUB_REF_NAME#v}"
          npm version "$VER" --no-git-tag-version

      - name: Publish to npm
        working-directory: packages/npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
