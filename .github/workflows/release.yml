name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
            archive: zip
            plugin_ext: .exe

          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
            archive: tar.gz
            plugin_ext: ""

          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
            archive: tar.gz
            plugin_ext: ""
            cross_compile: true

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            archive: tar.gz
            plugin_ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify tag version matches Cargo.toml
        if: github.event_name != 'workflow_dispatch' && matrix.os == 'ubuntu-latest'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION="$(grep '^version' crates/core/Cargo.toml | head -1 | cut -d'"' -f2)"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "❌ Tag v${TAG_VERSION} does not match Cargo.toml ${CARGO_VERSION}"
            echo "   Update all Cargo.toml versions to ${TAG_VERSION} before tagging."
            exit 1
          fi
          echo "✅ Tag v${TAG_VERSION} matches Cargo.toml ${CARGO_VERSION}"

      - name: Set binary directory
        shell: bash
        run: |
          if [ "${{ matrix.cross_compile }}" = "true" ]; then
            echo "BINARY_DIR=target/${{ matrix.target }}/release" >> $GITHUB_ENV
          else
            echo "BINARY_DIR=target/release" >> $GITHUB_ENV
          fi

      - name: Install cross-compilation target
        if: matrix.cross_compile == true
        run: rustup target add ${{ matrix.target }}

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross_compile }}" = "true" ]; then
            cargo build --release --workspace --target ${{ matrix.target }}
          else
            cargo build --release --workspace
          fi

      - name: Prepare Windows artifacts
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          mkdir staging -Force
          Copy-Item "target\release\santui.exe" staging\
          Copy-Item "target\release\santui-registry-plugin.exe" staging\

      - name: Prepare macOS artifacts
        if: startsWith(matrix.os, 'macos')
        run: |
          mkdir -p staging/native
          cp "${BINARY_DIR}/santui" staging/
          cp "${BINARY_DIR}/santui-registry-plugin" staging/
          cp native/radio_stream_stations.db staging/native/

      - name: Prepare Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p staging/native
          cp target/release/santui staging/
          cp target/release/santui-registry-plugin staging/
          cp native/radio_stream_stations.db staging/native/

      - name: Get version
        shell: bash
        run: |
          VERSION="$(grep '^version' crates/core/Cargo.toml | head -1 | cut -d'"' -f2)"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Generate plugins.json (PowerShell)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $version = "$env:VERSION"
          $target = "${{ matrix.target }}"
          $ext = "${{ matrix.plugin_ext }}"
          $plugins = @()

          $pluginNames = @(
            @{id="radio-stream-player"; name="Radio Stream Player"; desc="Listen to thousands of radio stations worldwide"; caps=@("background")}
            @{id="weather";             name="Weather";             desc="Current conditions, hourly & 7-day forecast, location search, auto-refresh"; caps=@()}
            @{id="rss-reader";          name="RSS Reader";          desc="Subscribe to and read RSS/Atom feeds"; caps=@()}
            @{id="clipboard-history";   name="Clipboard History";   desc="Track and search clipboard history"; caps=@()}
            @{id="system-monitor";      name="System Monitor";      desc="Real-time CPU, memory, disk, network, and process monitor"; caps=@()}
            @{id="world-clock";         name="World Clock";         desc="World timezone clock with grid, detail view, search, and custom labels"; caps=@()}
            @{id="unit-converter";      name="Unit Converter";      desc="Offline converter for common measurement units"; caps=@()}
            @{id="regex-tester";        name="Regex Tester";        desc="Interactive regular expression tester with captures and replacement preview"; caps=@()}
            @{id="json-yaml-formatter"; name="JSON/YAML Formatter"; desc="Format, validate, minify, and convert JSON and YAML snippets"; caps=@()}
            @{id="todo-task-manager";  name="Todo Task Manager";  desc="Local-first task manager with priorities, due dates, tags, and search"; caps=@()}
            @{id="bookmark-launcher";  name="Bookmark Launcher";  desc="Search, open, and copy URLs, paths, command snippets, and notes"; caps=@()}
            @{id="cron-expression-helper"; name="Cron Expression Helper"; desc="Validate cron expressions, explain schedules, and preview upcoming runs"; caps=@()}
            @{id="calendar-agenda";   name="Calendar Agenda";   desc="Display local ICS calendars as a searchable daily agenda"; caps=@()}
            @{id="package-version-monitor"; name="Package Version Monitor"; desc="Scan manifests and check dependency versions across ecosystems"; caps=@()}
            @{id="dictionary-thesaurus"; name="Dictionary/Thesaurus"; desc="Look up definitions, examples, synonyms, and antonyms"; caps=@()}
            @{id="git-repository-dashboard"; name="Git Repository Dashboard"; desc="Track local Git repositories, branch status, changes, and recent commits"; caps=@()}
            @{id="quran-reader"; name="Quran"; desc="Read Quran text and translations with recitation playback"; caps=@("background")}
          )

          foreach ($p in $pluginNames) {
            $filename = "$($p.id)-$target$ext"
            # Binary in target/release/ uses santui- prefix (e.g. santui-radio-stream-player.exe)
            $binPath = "target\release\santui-$($p.id)$ext"
            if (Test-Path $binPath) {
              $sha = (Get-FileHash -Algorithm SHA256 $binPath).Hash.ToLower()
              $size = (Get-Item $binPath).Length
              $plugins += [PSCustomObject]@{
                id = $p.id
                name = $p.name
                description = $p.desc
                publisher = "Santui"
                version = $version
                download_url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$filename"
                sha256 = $sha
                size = $size
                capabilities = $p.caps
              }
            }
          }

          $plugins | ConvertTo-Json -AsArray | Out-File -Encoding utf8 "plugins-$target.json"
          Write-Host "Generated plugins-$target.json with $($plugins.Count) plugin(s)"

      - name: Generate plugins.json (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          VERSION="${{ env.VERSION }}"
          TARGET="${{ matrix.target }}"
          EXT="${{ matrix.plugin_ext }}"
          REPO="${{ github.repository }}"
          TAG="${{ github.ref_name }}"

          # Portable SHA256: works on Linux (sha256sum) and macOS (shasum -a 256)
          sha() {
            sha256sum "$1" 2>/dev/null | cut -d' ' -f1 || shasum -a 256 "$1" 2>/dev/null | cut -d' ' -f1
          }

          entries=""
          add_plugin() {
            local id="$1" name="$2" desc="$3" caps="$4"
            local bin="${BINARY_DIR}/santui-${id}${EXT}"
            [ -f "$bin" ] || return
            local hash="$(sha "$bin")"
            local size="$(stat -c%s "$bin" 2>/dev/null || stat -f%z "$bin" 2>/dev/null)"
            local dl="https://github.com/${REPO}/releases/download/${TAG}/${id}-${TARGET}${EXT}"
            [ -n "$entries" ] && entries="$entries,"
            entries="$entries{\"id\":\"$id\",\"name\":\"$name\",\"description\":\"$desc\",\"publisher\":\"Santui\",\"version\":\"$VERSION\",\"download_url\":\"$dl\",\"sha256\":\"$hash\",\"size\":$size,\"capabilities\":$caps}"
          }

          add_plugin "radio-stream-player" "Radio Stream Player" "Listen to thousands of radio stations worldwide" '["background"]'
          add_plugin "weather"             "Weather"             "Current conditions, hourly & 7-day forecast, location search, auto-refresh" '[]'
          add_plugin "rss-reader"          "RSS Reader"          "Subscribe to and read RSS/Atom feeds" '[]'
          add_plugin "clipboard-history"   "Clipboard History"   "Track and search clipboard history" '[]'
          add_plugin "hacker-news-reader"  "Hacker News Reader"  "Browse top, new, and best stories from Hacker News" '[]'
          add_plugin "system-monitor"      "System Monitor"      "Real-time CPU, memory, disk, network, and process monitor" '[]'
          add_plugin "world-clock"         "World Clock"         "World timezone clock with grid, detail view, search, and custom labels" '[]'
          add_plugin "unit-converter"      "Unit Converter"      "Offline converter for common measurement units" '[]'
          add_plugin "regex-tester"        "Regex Tester"        "Interactive regular expression tester with captures and replacement preview" '[]'
          add_plugin "json-yaml-formatter" "JSON/YAML Formatter" "Format, validate, minify, and convert JSON and YAML snippets" '[]'
          add_plugin "todo-task-manager"  "Todo Task Manager"  "Local-first task manager with priorities, due dates, tags, and search" '[]'
          add_plugin "bookmark-launcher"  "Bookmark Launcher"  "Search, open, and copy URLs, paths, command snippets, and notes" '[]'
          add_plugin "cron-expression-helper" "Cron Expression Helper" "Validate cron expressions, explain schedules, and preview upcoming runs" '[]'
          add_plugin "calendar-agenda"   "Calendar Agenda"   "Display local ICS calendars as a searchable daily agenda" '[]'
          add_plugin "package-version-monitor" "Package Version Monitor" "Scan manifests and check dependency versions across ecosystems" '[]'
          add_plugin "dictionary-thesaurus" "Dictionary/Thesaurus" "Look up definitions, examples, synonyms, and antonyms" '[]'
          add_plugin "git-repository-dashboard" "Git Repository Dashboard" "Track local Git repositories, branch status, changes, and recent commits" '[]'
          add_plugin "quran-reader" "Quran" "Read Quran text and translations with recitation playback" '["background"]'

          printf '[%s]\n' "$entries" > "plugins-${TARGET}.json"
          echo "Generated plugins-${TARGET}.json"

      - name: Collect plugin binaries for upload
        shell: bash
        run: |
          mkdir -p plugin-binaries
          for binary in "${BINARY_DIR}"/santui-*-plugin${{ matrix.plugin_ext }} "${BINARY_DIR}"/santui-{radio-stream-player,weather,rss-reader,clipboard-history,hacker-news-reader,system-monitor,world-clock,unit-converter,regex-tester,json-yaml-formatter,todo-task-manager,bookmark-launcher,cron-expression-helper,calendar-agenda,package-version-monitor,dictionary-thesaurus,git-repository-dashboard,quran-reader}${{ matrix.plugin_ext }}; do
            [ -f "$binary" ] || continue
            name="$(basename "$binary")"
            # Strip .exe and also strip the santui- prefix so the filename
            # matches the download_url in plugins.json and the release glob.
            stem="${name%.exe}"
            id="${stem#santui-}"
            target_name="${id}-${{ matrix.target }}${{ matrix.plugin_ext }}"
            cp "$binary" "plugin-binaries/$target_name"
            size="$(stat -c%s "plugin-binaries/$target_name" 2>/dev/null || stat -f%z "plugin-binaries/$target_name" 2>/dev/null)"
            if [ -z "$size" ] || [ "$size" -eq 0 ]; then
              echo "❌ ERROR: plugin binary $target_name has size 0 or could not read size"
              exit 1
            fi
            echo "Collected plugin: $target_name ($size bytes)"
          done

      - name: Package Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Add-Type -Assembly System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::CreateFromDirectory("staging", "santui-${{ matrix.target }}.zip")

      - name: Package Unix
        if: matrix.os != 'windows-latest'
        run: |
          tar czf "santui-${{ matrix.target }}.tar.gz" -C staging .

      - name: Upload artifact (main archive)
        uses: actions/upload-artifact@v7
        with:
          name: santui-${{ matrix.target }}
          path: santui-${{ matrix.target }}.${{ matrix.archive }}

      - name: Upload artifact (plugins.json)
        uses: actions/upload-artifact@v7
        with:
          name: plugins-${{ matrix.target }}
          path: plugins-${{ matrix.target }}.json

      - name: Upload artifact (plugin binaries)
        uses: actions/upload-artifact@v7
        with:
          name: plugin-binaries-${{ matrix.target }}
          path: plugin-binaries/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: santui-*
          merge-multiple: true

      - uses: actions/download-artifact@v8
        with:
          pattern: plugins-*
          merge-multiple: true

      - uses: actions/download-artifact@v8
        with:
          pattern: plugin-binaries-*
          merge-multiple: true

      - name: List all assets for release
        run: ls -la

      - name: Validate asset sizes
        run: |
          echo "=== Checking for empty files ==="
          has_empty=0
          for f in santui-* plugins-*.json radio-stream-player-* unit-converter-* regex-tester-* json-yaml-formatter-* todo-task-manager-* bookmark-launcher-* cron-expression-helper-* calendar-agenda-* package-version-monitor-* dictionary-thesaurus-* git-repository-dashboard-* quran-reader-*; do
            if [ -f "$f" ]; then
              size=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f" 2>/dev/null)
              if [ "$size" -eq 0 ]; then
                echo "❌ EMPTY: $f (0 bytes)"
                has_empty=1
              else
                echo "  OK: $f ($size bytes)"
              fi
            fi
          done
          if [ "$has_empty" -eq 1 ]; then
            echo "❌ One or more release assets are empty — aborting"
            exit 1
          fi
          echo "✅ All release assets have valid sizes"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            santui-*
            plugins-*.json
            radio-stream-player-*
            weather-*
            rss-reader-*
            clipboard-history-*
            system-monitor-*
            world-clock-*
            unit-converter-*
            regex-tester-*
            json-yaml-formatter-*
            todo-task-manager-*
            bookmark-launcher-*
            cron-expression-helper-*
            calendar-agenda-*
            package-version-monitor-*
            dictionary-thesaurus-*
            git-repository-dashboard-*
            quran-reader-*
          fail_on_unmatched_files: false
          generate_release_notes: true

  publish-npm:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Set package version from tag
        working-directory: packages/npm
        run: |
          VER="${GITHUB_REF_NAME#v}"
          CURRENT="$(jq -r '.version' package.json)"
          if [ "$VER" != "$CURRENT" ]; then
            npm version "$VER" --no-git-tag-version
          fi

      - name: Publish to npm
        working-directory: packages/npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-crates:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish workspace crates (dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # core → ipc → auth → db → registry → app (santui-app is just "santui")
          for crate in core ipc auth db registry; do
            echo "» Publishing santui-$crate …"
            cargo publish -p "santui-$crate"
            sleep 60
          done
          echo "» Publishing santui …"
          cargo publish -p santui
