name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  MPV_VERSION: 20260610
  MPV_SHA: 304426c

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
            archive: zip
            mpv_url: https://github.com/shinchiro/mpv-winbuild-cmake/releases/download/20260610/mpv-dev-x86_64-20260610-git-304426c.7z
            mpv_dll: libmpv-2.dll

          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ''
            archive: tar.gz

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ''
            archive: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libmpv-dev

      - name: Install macOS deps
        if: matrix.os == 'macos-latest'
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
        run: brew install mpv

      - name: Build
        run: cargo build --release --workspace

      - name: Prepare Windows artifacts
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          mkdir staging\native -Force
          Copy-Item "target\release\santui.exe" staging\
          Copy-Item "target\release\santui-radio-streaming-player.exe" staging\
          Copy-Item "native\libmpv-2.dll" "staging\native\" -ErrorAction SilentlyContinue
          if (-not (Test-Path "staging\native\libmpv-2.dll")) {
            Write-Host "Downloading mpv DLL..."
            $tmp = "$env:TEMP\mpv.7z"
            Invoke-WebRequest -Uri "${{ matrix.mpv_url }}" -OutFile $tmp -UseBasicParsing
            7z x $tmp -o"staging\native\" "*.dll" -y | Out-Null
            Remove-Item $tmp -Force
          }
          Copy-Item "native\radio_streaming_stations.db" "staging\native\"

      - name: Prepare macOS artifacts
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p staging/native
          cp target/release/santui staging/
          cp target/release/santui-radio-streaming-player staging/
          cp native/radio_streaming_stations.db staging/native/

          # ── Bundle libmpv + all transitive dylib deps ──
          # Homebrew dylibs embed absolute LC_LOAD_DYLIB paths pointing to
          # /opt/homebrew/lib/ which won't exist on users without Homebrew.
          # We recursively collect every dependency and rewrite all paths
          # to @loader_path-relative so the entire bundle is relocatable.
          NATIVE="staging/native"
          cp /opt/homebrew/lib/libmpv.2.dylib "$NATIVE/"

          # Recursively bundle all transitive Homebrew dylib deps.
          # Libraries under /opt/homebrew/ or /usr/local/ are never system
          # libraries (those live under /usr/lib/ or /System/), so we copy
          # everything our grep matches.  No skip list needed.
          bundle_deps() {
            local dylib="$1"
            local deps
            deps="$(otool -L "$dylib" 2>/dev/null \
              | tail -n +2 \
              | grep -E '^[[:space:]]+/(opt/homebrew|usr/local)/lib' \
              | awk '{print $1}' \
              || true)"
            for dep in $deps; do
              local name; name="$(basename "$dep")"
              local target="$NATIVE/$name"
              if [ ! -f "$target" ]; then
                cp "$dep" "$target"
                install_name_tool -id "@loader_path/$name" "$target" 2>/dev/null || true
                bundle_deps "$target"
              fi
              install_name_tool -change "$dep" "@loader_path/$name" "$dylib" 2>/dev/null || true
            done
          }

          bundle_deps "$NATIVE/libmpv.2.dylib"

          echo "=== Bundled dylibs ==="
          ls -la "$NATIVE/"
          echo ""
          echo "=== libmpv.2.dylib resolved deps (post-fix) ==="
          otool -L "$NATIVE/libmpv.2.dylib"

      - name: Prepare Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p staging/native
          cp target/release/santui staging/
          cp target/release/santui-radio-streaming-player staging/
          cp native/radio_streaming_stations.db staging/native/
          # libmpv not bundled on Linux — use system package manager

      - name: Package Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Add-Type -Assembly System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::CreateFromDirectory("staging", "santui-${{ matrix.target }}.zip")

      - name: Package Unix
        if: matrix.os != 'windows-latest'
        run: |
          tar czf "santui-${{ matrix.target }}.tar.gz" -C staging .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: santui-${{ matrix.target }}
          path: santui-${{ matrix.target }}.${{ matrix.archive }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: santui-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: santui-*
          generate_release_notes: true
